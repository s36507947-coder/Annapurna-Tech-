<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annapurna Tech - Farmer Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Green Theme & Smooth Transitions */
        :root {
            --primary-green: #2d6a4f;
            --light-green: #d8f3dc;
        }
        body {
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .input-card {
            transition: transform 0.2s;
        }
        .input-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-green-800 mb-2">🌾 Annapurna Tech</h1>
            <p class="text-green-600 italic">আপনার খামারের ডিজিটাল সঙ্গী</p>
        </header>

        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 border-t-8 border-green-600 input-card">
            <h2 class="text-xl font-semibold text-gray-800 mb-6 flex items-center">
                <span class="mr-2">📊</span> ফিল্ড ডেটা এন্ট্রি করুন
            </h2>

            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Soil Moisture Data (int)</label>
                    <input type="number" id="soil" placeholder="উদা: 45" 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">NPK Sensors Data</label>
                    <input type="text" id="npk" placeholder="উদা: 20-10-10" 
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
                </div>

                <button onclick="sendData()" id="submitBtn" 
                    class="w-full bg-green-700 hover:bg-green-800 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex justify-center items-center">
                    <span id="btnText">ডেটা পাঠান (Submit)</span>
                    <svg id="loadingSpinner" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="mt-8 grid grid-cols-2 gap-4">
            <div class="bg-green-100 p-4 rounded-lg text-center border border-green-200">
                <p class="text-xs text-green-700 uppercase font-bold">Status</p>
                <p id="status" class="font-medium text-gray-800 italic">অপেক্ষা করা হচ্ছে...</p>
            </div>
            <div class="bg-blue-100 p-4 rounded-lg text-center border border-blue-200">
                <p class="text-xs text-blue-700 uppercase font-bold">Backend</p>
                <p class="font-medium text-gray-800">Flask + n8n</p>
            </div>
        </div>
    </div>

    <script>
        async function sendData() {
            const soil = document.getElementById('soil').value;
            const npk = document.getElementById('npk').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const statusText = document.getElementById('status');

            // বেসিক ভ্যালিডেশন
            if (!soil || !npk) {
                alert("দয়া করে সব বক্স পূরণ করুন!");
                return;
            }

            // UI আপডেট (Loading State)
            btn.disabled = true;
            btnText.innerText = "পাঠানো হচ্ছে...";
            spinner.classList.remove('hidden');
            statusText.innerText = "ডেটা সার্ভারে যাচ্ছে...";

            // আপনার Render/Flask URL এখানে বসাবেন
            const RENDER_FLASK_URL = "https://your-flask-app.onrender.com/submit-data";

            const payload = {
                soil_moisture: parseInt(soil),
                npk_data: npk,
                timestamp: new Date().toLocaleString('bn-BD')
            };

            try {
                const response = await fetch(RENDER_FLASK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    statusText.innerText = "সফলভাবে Google Sheet-এ জমা হয়েছে!";
                    statusText.classList.add('text-green-700');
                    alert("সাফল্য! ডেটা পাঠানো হয়েছে।");
                    // ফর্ম ক্লিয়ার করা
                    document.getElementById('soil').value = "";
                    document.getElementById('npk').value = "";
                } else {
                    throw new Error("সার্ভার সমস্যা");
                }
            } catch (error) {
                console.error("Error:", error);
                statusText.innerText = "ব্যর্থ হয়েছে! আবার চেষ্টা করুন।";
                statusText.classList.add('text-red-600');
                alert("ডেটা পাঠানো সম্ভব হয়নি। n8n বা Flask চেক করুন।");
            } finally {
                // UI রিসেট
                btn.disabled = false;
                btnText.innerText = "ডেটা পাঠান (Submit)";
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
